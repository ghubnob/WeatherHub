<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Weather Viewer – Search Results</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>

<nav class="navbar navbar-light bg-light">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/}">
            <img th:src="@{/images/weather-app.png}" alt="Logo" width="30" height="24" class="d-inline-block align-text-top">
            Weather Tracker
        </a>
        <div class="d-flex align-items-center">
            <span class="navbar-text me-3" th:text="${username}">UserName</span>
            <button class="btn btn-outline-danger" th:onclick="|location.href='@{/logout}'|">Sign out</button>
        </div>
    </div>
</nav>

<section id="page-content">
    <div class="container mt-4">
        <!-- Форма поиска (оставляем возможность искать новый город) -->
        <form method="post" th:action="@{/locations}" class="d-flex my-4">
            <div class="input-group location-search-input-group me-3">
                <input class="form-control" type="text" name="name" placeholder="Enter location"
                       th:value="${param.cityName}" required>
                <button class="btn btn-outline-secondary btn-sm clear-input-button" type="button"
                        onclick="this.previousElementSibling.value=''">
                    &times;
                </button>
            </div>
            <button class="btn btn-outline-success" type="submit">Search</button>
        </form>

        <div>
            <h2>Locations found:</h2>
            <div class="row">
                <!-- Статическая заглушка: если список пуст, показываем сообщение -->
                <div th:if="${response == null or response.empty}" class="col-12">
                    <div class="alert alert-info">No locations found. Try another name.</div>
                </div>
                <!-- Динамический вывод каждого города -->
                <div class="col-12 col-lg-3 col-md-6 mb-4" th:each="city : ${response}">
                    <div class="card h-100">
                        <div class="card-body d-flex flex-column">
                            <h5 class="card-title" th:text="${city.name} + ', ' + ${city.country}">San Francisco, US</h5>
                            <p class="card-text mb-1">
                                <span th:text="'Latitude: ' + ${city.lat}">Latitude: 67.1337</span>
                            </p>
                            <p class="card-text mb-1">
                                <span th:text="'Longitude: ' + ${city.lon}">Longitude: -228.1996</span>
                            </p>
                            <div th:if="${city.state != null}" class="card-text mb-3" th:text="'State: ' + ${city.state}">State: California</div>
                            <div class="mt-auto">
                                <!-- Форма добавления локации в БД -->
                                <form method="post" th:action="@{/locations/add}">
                                    <input type="hidden" name="locationName" th:value="${city.name}">
                                    <input type="hidden" name="latitude" th:value="${city.lat}">
                                    <input type="hidden" name="longitude" th:value="${city.lon}">
                                    <button type="submit" class="btn btn-primary w-100">Add</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<footer class="d-flex flex-wrap justify-content-between align-items-center py-3 mt-4 border-top">
    <div class="px-4">
        <span>© Weather Viewer, project from <a href="https://zhukovsd.github.io/java-backend-learning-course/">zhukovsd/java-backend-learning-course</a> roadmap.</span>
    </div>
</footer>

</body>
</html>
