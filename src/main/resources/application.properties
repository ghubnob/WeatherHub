spring.application.name=weather-viewer

spring.datasource.url=jdbc:postgresql://localhost:5433/weather
spring.datasource.username=postgres
spring.datasource.password=1
spring.jpa.hibernate.ddl-auto=none

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.output.ansi.enabled=ALWAYS
spring.flyway.locations=classpath:db/migration

openweather.api-key=${OPENWEATHER_API_KEY}
openweather.api-url-city=https://api.openweathermap.org/data/2.5/weather?appid={API_KEY}&lon={lon}&lat={lat}&units=metric&lang=ru
openweather.api-url-cities=http://api.openweathermap.org/geo/1.0/direct?q={cityName}&limit=8&appid={API_KEY}&lang=ru
